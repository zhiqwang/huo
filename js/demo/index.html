<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CT Radon Transform &amp; ART Reconstruction — jax-js</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: #0f1117;
        color: #e0e0e0;
        padding: 24px;
      }
      h1 {
        font-size: 1.6rem;
        color: #f5f5f5;
        margin-bottom: 4px;
      }
      .subtitle {
        color: #888;
        font-size: 0.9rem;
        margin-bottom: 24px;
      }
      .subtitle a {
        color: #6ea8fe;
      }
      .panels {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
        margin-bottom: 20px;
      }
      .panel {
        background: #1a1d27;
        border-radius: 8px;
        padding: 16px;
      }
      .panel h3 {
        font-size: 0.85rem;
        color: #aaa;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 10px;
      }
      canvas {
        display: block;
        border-radius: 4px;
        background: #000;
      }
      .controls {
        display: flex;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }
      button {
        background: #3b82f6;
        color: #fff;
        border: none;
        padding: 10px 24px;
        border-radius: 6px;
        font-size: 0.95rem;
        cursor: pointer;
        transition: background 0.15s;
      }
      button:hover {
        background: #2563eb;
      }
      button:disabled {
        background: #555;
        cursor: default;
      }
      #status {
        font-size: 0.9rem;
        color: #aaa;
      }
      progress {
        width: 200px;
        height: 8px;
        appearance: none;
        border-radius: 4px;
        overflow: hidden;
      }
      progress::-webkit-progress-bar {
        background: #2a2d37;
        border-radius: 4px;
      }
      progress::-webkit-progress-value {
        background: #3b82f6;
        border-radius: 4px;
      }
      label {
        font-size: 0.9rem;
        color: #aaa;
      }
      input[type="range"] {
        width: 120px;
        accent-color: #3b82f6;
      }
      .delay-value {
        display: inline-block;
        min-width: 46px;
        text-align: right;
        font-variant-numeric: tabular-nums;
      }
    </style>
  </head>
  <body>
    <h1>CT Radon Transform &amp; ART Reconstruction</h1>
    <p class="subtitle">
      Forward projection (Radon transform) · Back-projection · ART iterative reconstruction
      · Powered by
      <a href="https://github.com/ekzhang/jax-js" target="_blank">jax-js</a>
      · Ported from
      <a href="https://github.com/zhiqwang/huo" target="_blank">huo</a>
      · Terminology follows
      <a href="https://torch-radon.readthedocs.io/en/latest/" target="_blank">torch-radon</a>
    </p>

    <div class="panels">
      <div class="panel">
        <h3>Original Phantom</h3>
        <canvas id="phantom" width="256" height="256"></canvas>
      </div>
      <div class="panel">
        <h3>Sinogram (Forward Projection)</h3>
        <canvas id="sinogram" width="360" height="256"></canvas>
      </div>
      <div class="panel">
        <h3>Reconstruction (ART)</h3>
        <canvas id="reconstruction" width="256" height="256"></canvas>
      </div>
    </div>

    <div class="controls">
      <button id="startBtn" disabled>Start</button>
      <progress id="progress" value="0" max="100"></progress>
      <span id="status">Loading…</span>
    </div>
    <div class="controls">
      <label>
        Frame delay:
        <input id="delaySlider" type="range" min="0" max="200" value="20" step="5" />
        <span id="delayValue" class="delay-value">20 ms</span>
      </label>
    </div>

    <script type="importmap">
      {
        "imports": {
          "@jax-js/jax": "https://esm.sh/@jax-js/jax@0.1.10"
        }
      }
    </script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
